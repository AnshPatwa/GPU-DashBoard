<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPU TACTICAL MONITOR</title>
<style>
  :root {
    --bg: #0a0c0e;
    --bg-2: #0e1114;
    --panel: #13171b;
    --panel-2: #181d22;
    --line: #262d33;
    --line-hi: #3a444c;
    --ink: #e8e6e0;
    --ink-2: #9aa4ad;
    --ink-3: #5c666f;
    --orange: #ff9e2c;
    --orange-hot: #ff6b1a;
    --green: #4ade80;
    --red: #ff4b4b;
    --amber: #ffd24a;
    --cyan: #55d7ff;
    --mono: Consolas, "Cascadia Mono", "Courier New", monospace;
    --stencil: "Impact", "Haettenschweiler", "Arial Narrow Bold", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---------- tactical backdrop ---------- */
  #smokeCanvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    width: 100vw; height: 100vh;
  }
  .grid-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      linear-gradient(rgba(85, 215, 255, .03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(85, 215, 255, .03) 1px, transparent 1px);
    background-size: 44px 44px;
  }
  .vignette {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 40%, transparent 55%, rgba(0,0,0,.55) 100%);
  }
  .scanlines {
    position: fixed; inset: 0; z-index: 50; pointer-events: none; opacity: .35;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,.22) 0 1px, transparent 1px 3px);
  }

  /* ---------- falling ash + rising embers ---------- */
  .ash {
    position: fixed; top: -12px; z-index: 0; pointer-events: none;
    width: 4px; height: 4px; border-radius: 40% 60% 55% 45%;
    background: #6f7982; opacity: .35;
    animation: ashfall linear infinite, ashsway ease-in-out infinite alternate;
  }
  @keyframes ashfall {
    to { transform: translateY(110vh) rotate(300deg); }
  }
  @keyframes ashsway { from { margin-left: 0; } to { margin-left: 70px; } }
  .ember {
    position: fixed; bottom: -10px; z-index: 0; pointer-events: none;
    width: 3px; height: 3px; border-radius: 50%;
    background: var(--orange);
    box-shadow: 0 0 6px 1px rgba(255, 158, 44, .8);
    opacity: 0;
    animation: emberrise linear infinite, embersway ease-in-out infinite alternate;
  }
  @keyframes emberrise {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    8% { opacity: .85; }
    60% { opacity: .5; }
    100% { transform: translateY(-105vh) scale(.4); opacity: 0; }
  }
  @keyframes embersway { from { margin-left: 0; } to { margin-left: -50px; } }

  /* ---------- corner brackets ---------- */
  .brk { position: relative; }
  .brk::before, .brk::after,
  .brk > .brk-b::before, .brk > .brk-b::after {
    content: ""; position: absolute; width: 14px; height: 14px;
    border-color: var(--line-hi); border-style: solid; z-index: 2;
  }
  .brk::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .brk::after  { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .brk > .brk-b::before { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .brk > .brk-b::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  /* ============================================================
     OPERATOR SELECT (netflix-style profiles)
  ============================================================ */
  #profileScreen {
    position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(ellipse at 50% 45%, rgba(10, 12, 14, .25) 0%, rgba(10, 12, 14, .8) 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; padding: 30px 20px;
    transition: opacity .45s ease, visibility .45s;
  }
  #profileScreen.gone { opacity: 0; visibility: hidden; }
  #profileScreen .grid-bg2 {
    position: absolute; inset: 0; pointer-events: none;
    background:
      linear-gradient(rgba(255, 158, 44, .04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 158, 44, .04) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
  }
  .ps-topline {
    font-family: var(--mono); font-size: .78rem; letter-spacing: .5em; color: var(--orange);
    text-transform: uppercase; margin-bottom: 6px;
  }
  .ps-title {
    font-family: var(--stencil); font-size: clamp(2.2rem, 6vw, 4rem);
    letter-spacing: .08em; text-transform: uppercase; line-height: 1;
    color: var(--ink);
  }
  .ps-title span { color: var(--orange); }
  .ps-sub { font-family: var(--mono); color: var(--ink-3); font-size: .85rem; margin: 14px 0 40px; letter-spacing: .12em; }
  .ps-sub .blink { animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .op-grid { display: flex; flex-wrap: wrap; gap: 22px; justify-content: center; max-width: 900px; z-index: 1; }
  .op {
    width: 128px; cursor: pointer; text-align: center; border: none; background: none;
    color: var(--ink); font-family: inherit;
    transition: transform .18s ease;
  }
  .op:hover { transform: translateY(-6px); }
  .op .face {
    width: 110px; height: 110px; margin: 0 auto;
    clip-path: polygon(50% 0, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
    background: var(--panel-2);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--stencil); font-size: 2.1rem; letter-spacing: .05em;
    position: relative;
    border: none;
    transition: filter .18s ease;
  }
  .op .face::before {
    content: ""; position: absolute; inset: 0;
    clip-path: polygon(50% 0, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%,
                       50% 6.5%, 12.5% 27.5%, 12.5% 72.5%, 50% 93.5%, 87.5% 72.5%, 87.5% 27.5%, 50% 6.5%);
    background: var(--op-c, var(--orange));
    opacity: .9;
  }
  .op .face b { color: var(--op-c, var(--orange)); font-weight: 400; }
  .op:hover .face { filter: drop-shadow(0 0 14px var(--op-c, var(--orange))) brightness(1.15); }
  .op .callsign {
    margin-top: 12px; font-family: var(--mono); font-size: .82rem; letter-spacing: .22em;
    text-transform: uppercase; color: var(--ink-2);
  }
  .op:hover .callsign { color: var(--ink); }
  .op .rank { font-family: var(--mono); font-size: .62rem; color: var(--ink-3); letter-spacing: .18em; margin-top: 3px; text-transform: uppercase; }
  .op.new .face { color: var(--ink-3); font-size: 2.6rem; }
  .op.new .face::before { background: var(--line-hi); }

  .ps-name-entry { display: none; margin-top: 34px; z-index: 1; }
  .ps-name-entry.show { display: flex; gap: 10px; align-items: center; }
  .ps-name-entry input {
    background: var(--panel); border: 1px solid var(--line-hi); color: var(--ink);
    font-family: var(--mono); font-size: 1rem; letter-spacing: .2em; text-transform: uppercase;
    padding: 12px 16px; width: 240px; outline: none;
  }
  .ps-name-entry input:focus { border-color: var(--orange); box-shadow: 0 0 0 1px var(--orange); }
  .ps-name-entry button {
    background: var(--orange); border: none; color: #10130f; font-family: var(--stencil);
    font-size: 1rem; letter-spacing: .14em; padding: 12px 26px; cursor: pointer; text-transform: uppercase;
  }
  .ps-name-entry button:hover { background: var(--orange-hot); }

  /* ============================================================
     COMMAND HEADER
  ============================================================ */
  header {
    position: sticky; top: 0; z-index: 40;
    display: flex; align-items: center; gap: 18px;
    padding: 0 26px; height: 62px;
    background: rgba(10, 12, 14, .72);
    border-bottom: 1px solid var(--line);
  }
  header::after {
    content: ""; position: absolute; left: 0; bottom: -1px; height: 1px; width: 100%;
    background: linear-gradient(90deg, transparent, var(--orange) 35%, var(--orange) 65%, transparent);
    opacity: .5;
  }
  .logo { display: flex; align-items: baseline; gap: 10px; }
  .logo .mark {
    font-family: var(--stencil); font-size: 1.35rem; letter-spacing: .1em; color: var(--ink);
    text-transform: uppercase;
  }
  .logo .mark span { color: var(--orange); }
  .logo .ver { font-family: var(--mono); font-size: .65rem; color: var(--ink-3); letter-spacing: .2em; }
  .head-spacer { flex: 1; }
  .hud-clock { font-family: var(--mono); font-size: .85rem; color: var(--ink-2); letter-spacing: .18em; }
  .hub-status { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: .72rem; letter-spacing: .16em; color: var(--ink-2); text-transform: uppercase; }
  .led { width: 9px; height: 9px; border-radius: 50%; background: var(--ink-3); }
  .led.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: ledpulse 1.6s infinite; }
  .led.dead { background: var(--red); box-shadow: 0 0 8px var(--red); }
  @keyframes ledpulse { 50% { opacity: .45; } }

  .op-chip {
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    border: 1px solid var(--line); background: var(--panel); padding: 6px 12px 6px 6px;
    color: var(--ink); font-family: var(--mono);
  }
  .op-chip:hover { border-color: var(--orange); }
  .op-chip .mini {
    width: 30px; height: 30px; clip-path: polygon(50% 0, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
    background: var(--op-c, var(--orange)); color: #0a0c0e;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--stencil); font-size: .85rem;
  }
  .op-chip .cs { font-size: .78rem; letter-spacing: .18em; text-transform: uppercase; }
  .op-chip .sw { font-size: .6rem; color: var(--ink-3); letter-spacing: .12em; }

  /* ============================================================
     MAIN
  ============================================================ */
  main { position: relative; z-index: 1; max-width: 1240px; margin: 0 auto; padding: 30px 24px 90px; }

  .sec-head { display: flex; align-items: center; gap: 14px; margin: 34px 0 16px; }
  .sec-head .tag {
    font-family: var(--stencil); font-size: 1.15rem; letter-spacing: .16em; text-transform: uppercase;
    color: var(--ink);
  }
  .sec-head .tag::before { content: "// "; color: var(--orange); }
  .sec-head .rule { flex: 1; height: 1px; background: var(--line); }
  .sec-head .count { font-family: var(--mono); font-size: .7rem; color: var(--ink-3); letter-spacing: .2em; }

  /* ---- stat tiles ---- */
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .tile { background: rgba(19, 23, 27, .28); border: 1px solid var(--line); padding: 16px 18px 14px; }
  .tile .lbl { font-family: var(--mono); font-size: .64rem; letter-spacing: .24em; color: var(--ink-3); text-transform: uppercase; }
  .tile .val { font-family: var(--stencil); font-size: 2.3rem; letter-spacing: .04em; margin-top: 4px; line-height: 1; }
  .tile .val small { font-size: 1rem; color: var(--ink-3); font-family: var(--mono); }
  .tile:nth-child(1) .val { color: var(--green); }
  .tile:nth-child(2) .val { color: var(--ink); }
  .tile:nth-child(3) .val { color: var(--orange); }
  .tile:nth-child(4) .val { color: var(--cyan); }

  /* ---- server cards ---- */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(520px, 1fr)); gap: 18px; }
  @media (max-width: 600px) { .cards { grid-template-columns: 1fr; } }
  .card { background: rgba(19, 23, 27, .25); border: 1px solid var(--line); padding: 0; }
  .card:hover { border-color: var(--line-hi); }
  .card.offline { border-color: rgba(255, 75, 75, .35); }
  .card.offline .card-body { opacity: .45; }

  .card-head {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 18px; border-bottom: 1px solid var(--line);
    background: rgba(24, 29, 34, .32);
  }
  .card-head .sq { width: 8px; height: 8px; background: var(--orange); flex: none; }
  .card.offline .card-head .sq { background: var(--red); }
  .card-head .host {
    font-family: var(--stencil); font-size: 1.05rem; letter-spacing: .12em; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-head .spacer { flex: 1; }
  .status {
    font-family: var(--mono); font-size: .66rem; letter-spacing: .2em; padding: 4px 10px;
    text-transform: uppercase; border: 1px solid;
  }
  .status.on  { color: var(--green); border-color: rgba(74, 222, 128, .4); background: rgba(74, 222, 128, .07); }
  .status.off { color: var(--red); border-color: rgba(255, 75, 75, .45); background: rgba(255, 75, 75, .08); animation: blink 1.4s steps(1) infinite; }

  .card-body { padding: 4px 18px 16px; }

  .gpu-row { padding: 14px 0 12px; border-bottom: 1px dashed var(--line); }
  .gpu-top { display: flex; align-items: baseline; gap: 10px; }
  .gpu-idx { font-family: var(--mono); font-size: .68rem; color: var(--orange); letter-spacing: .1em; }
  .gpu-name { font-family: var(--mono); font-size: .82rem; color: var(--ink-2); letter-spacing: .04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .gpu-chips { display: flex; gap: 14px; font-family: var(--mono); font-size: .72rem; color: var(--ink-2); }
  .gpu-chips b { color: var(--ink); font-weight: 600; }
  .gpu-chips .t-warm b { color: var(--amber); }
  .gpu-chips .t-hot b  { color: var(--red); }

  .gpu-mid { display: flex; align-items: center; gap: 16px; margin-top: 10px; }
  .util-num {
    font-family: var(--stencil); font-size: 2.5rem; line-height: 1; width: 118px; flex: none;
    color: var(--orange); text-align: right; letter-spacing: .02em;
  }
  .util-num small { font-size: 1rem; color: var(--ink-3); font-family: var(--mono); }
  .util-num .cap { display: block; font-family: var(--mono); font-size: .58rem; color: var(--ink-3); letter-spacing: .28em; margin-top: 3px; }

  .bars { flex: 1; min-width: 0; }
  .seg-wrap { position: relative; height: 18px; background: var(--bg-2); border: 1px solid var(--line); }
  .seg-fill {
    position: absolute; inset: 2px auto 2px 2px; width: 0%;
    background: linear-gradient(90deg, #c85f10, var(--orange));
    transition: width .8s cubic-bezier(.22,1,.36,1);
  }
  .seg-fill.hot { background: linear-gradient(90deg, var(--orange-hot), var(--red)); }
  .seg-mask {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(90deg, transparent 0 calc(5% - 2px), var(--panel) calc(5% - 2px) 5%);
  }
  .vram-line { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .vram-line .k { font-family: var(--mono); font-size: .62rem; letter-spacing: .22em; color: var(--ink-3); width: 44px; flex: none; }
  .vbar { flex: 1; height: 6px; background: var(--bg-2); border: 1px solid var(--line); position: relative; }
  .vbar > i { position: absolute; inset: 1px auto 1px 1px; width: 0%; background: var(--cyan); opacity: .8; transition: width .8s ease; display: block; }
  .vram-line .v { font-family: var(--mono); font-size: .7rem; color: var(--ink-2); flex: none; }

  .spark { flex: none; opacity: .95; }

  .ram-row { display: flex; align-items: center; gap: 10px; padding: 13px 0 2px; }
  .ram-row .k { font-family: var(--mono); font-size: .62rem; letter-spacing: .22em; color: var(--ink-3); width: 96px; flex: none; }
  .ram-row .vbar > i { background: var(--green); }
  .ram-row .v { font-family: var(--mono); font-size: .72rem; color: var(--ink-2); }

  .gpu-error { font-family: var(--mono); font-size: .78rem; color: var(--amber); padding: 14px 0; }

  /* ---- empty / radar ---- */
  .empty { border: 1px dashed var(--line-hi); padding: 70px 20px; text-align: center; background: rgba(19, 23, 27, .25); }
  .radar { width: 110px; height: 110px; margin: 0 auto 22px; border-radius: 50%; border: 1px solid var(--line-hi); position: relative; overflow: hidden; }
  .radar::before { content: ""; position: absolute; inset: 25%; border-radius: 50%; border: 1px solid var(--line); }
  .radar .sweep {
    position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(from 0deg, rgba(74, 222, 128, .5), transparent 70deg, transparent);
    animation: sweep 2.6s linear infinite;
  }
  @keyframes sweep { to { transform: rotate(360deg); } }
  .empty .l1 { font-family: var(--stencil); font-size: 1.25rem; letter-spacing: .2em; text-transform: uppercase; }
  .empty .l2 { font-family: var(--mono); font-size: .78rem; color: var(--ink-3); margin-top: 10px; letter-spacing: .08em; }
  .empty code { color: var(--orange); }

  footer {
    position: relative; z-index: 1; text-align: center; padding: 20px;
    font-family: var(--mono); font-size: .66rem; letter-spacing: .3em; color: var(--ink-3); text-transform: uppercase;
  }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="grid-bg"></div>
<canvas id="smokeCanvas"></canvas>
<div class="vignette"></div>
<div class="scanlines"></div>

<!-- ================= OPERATOR SELECT ================= -->
<div id="profileScreen">
  <div class="grid-bg2"></div>
  <div class="op-grid" id="opGrid"></div>
  <div class="ps-name-entry" id="nameEntry">
    <input id="nameInput" maxlength="12" placeholder="ENTER CALLSIGN" spellcheck="false">
    <button id="nameGo">Deploy</button>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="hidden">
  <header>
    <div class="logo">
      <div class="mark">GPU<span>//</span>TACTICAL</div>
      <div class="ver">MONITOR v2.0</div>
    </div>
    <div class="head-spacer"></div>
    <div class="hud-clock" id="clock">--:--:--</div>
    <div class="hub-status"><span class="led" id="hubLed"></span><span id="hubText">LINKING…</span></div>
    <button class="op-chip" id="opChip" title="Switch operator">
      <span class="mini" id="opMini">?</span>
      <span><span class="cs" id="opName">—</span><br><span class="sw">▸ SWITCH OPERATOR</span></span>
    </button>
  </header>

  <main>
    <div class="sec-head"><span class="tag">Sector Overview</span><span class="rule"></span><span class="count" id="secTime">LIVE FEED</span></div>
    <div class="tiles">
      <div class="tile brk"><span class="brk-b"></span><div class="lbl">Units Online</div><div class="val" id="tServers">–</div></div>
      <div class="tile brk"><span class="brk-b"></span><div class="lbl">GPUs Deployed</div><div class="val" id="tGpus">–</div></div>
      <div class="tile brk"><span class="brk-b"></span><div class="lbl">Avg GPU Load</div><div class="val" id="tUtil">–<small>%</small></div></div>
      <div class="tile brk"><span class="brk-b"></span><div class="lbl">VRAM Engaged</div><div class="val" id="tVram">–<small>GB</small></div></div>
    </div>

    <div class="sec-head"><span class="tag">Deployed Units</span><span class="rule"></span><span class="count" id="unitCount">0 UNITS</span></div>
    <div class="cards" id="cards"></div>
    <div class="empty brk" id="empty">
      <span class="brk-b"></span>
      <div class="radar"><div class="sweep"></div></div>
      <div class="l1">Scanning for units…</div>
      <div class="l2">Run <code>python agent.py</code> on any GPU server — it will auto-register here.</div>
    </div>
  </main>

</div>

<script>
/* ============================================================
   OPERATOR PROFILES (netflix-style, stored per browser)
============================================================ */
const DEFAULT_OPS = [
  { cs: "GHOST",  color: "#ff9e2c", rank: "CDR" },
  { cs: "VIPER",  color: "#4ade80", rank: "LT" },
  { cs: "REAPER", color: "#ff4b4b", rank: "SGT" },
];

const profileScreen = document.getElementById("profileScreen");
const appEl = document.getElementById("app");
const opGrid = document.getElementById("opGrid");
const nameEntry = document.getElementById("nameEntry");
const nameInput = document.getElementById("nameInput");

function customOps() {
  try { return JSON.parse(localStorage.getItem("customOps") || "[]"); } catch { return []; }
}

function renderOps() {
  opGrid.innerHTML = "";
  const all = [...DEFAULT_OPS, ...customOps()];
  for (const op of all) {
    const b = document.createElement("button");
    b.className = "op";
    b.style.setProperty("--op-c", op.color);
    b.innerHTML = `<span class="face"><b>${op.cs.slice(0, 2)}</b></span>
                   <span class="callsign">${op.cs}</span>
                   <span class="rank">${op.rank || "OPR"} · CLEARANCE A</span>`;
    b.onclick = () => deploy(op);
    opGrid.appendChild(b);
  }
  const add = document.createElement("button");
  add.className = "op new";
  add.innerHTML = `<span class="face">+</span><span class="callsign">New Operator</span><span class="rank">register callsign</span>`;
  add.onclick = () => { nameEntry.classList.add("show"); nameInput.focus(); };
  opGrid.appendChild(add);
}

function deploy(op) {
  localStorage.setItem("operator", JSON.stringify(op));
  applyOperator(op);
  profileScreen.classList.add("gone");
  appEl.classList.remove("hidden");
}

function applyOperator(op) {
  document.getElementById("opName").textContent = op.cs;
  const mini = document.getElementById("opMini");
  mini.textContent = op.cs.slice(0, 2);
  document.getElementById("opChip").style.setProperty("--op-c", op.color);
}

document.getElementById("nameGo").onclick = () => {
  const cs = nameInput.value.trim().toUpperCase().replace(/[^A-Z0-9-]/g, "");
  if (!cs) return;
  const colors = ["#ff9e2c", "#4ade80", "#55d7ff", "#c084fc", "#ffd24a", "#ff4b4b"];
  const op = { cs, color: colors[cs.length % colors.length], rank: "OPR" };
  const list = customOps(); list.push(op);
  localStorage.setItem("customOps", JSON.stringify(list));
  deploy(op);
};
nameInput.addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("nameGo").click(); });

document.getElementById("opChip").onclick = () => {
  localStorage.removeItem("operator");
  appEl.classList.add("hidden");
  renderOps();
  profileScreen.classList.remove("gone");
};

renderOps();
const savedOp = localStorage.getItem("operator");
if (savedOp) { try { deploy(JSON.parse(savedOp)); } catch { localStorage.removeItem("operator"); } }

/* ============================================================
   SMOKE — canvas particle sim (buoyancy, drag, turbulence, wind)
============================================================ */
(function smoke() {
  const canvas = document.getElementById("smokeCanvas");
  const ctx = canvas.getContext("2d");
  let W, H;

  function resize() {
    const dpr = Math.min(devicePixelRatio || 1, 1.5);
    W = innerWidth; H = innerHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  addEventListener("resize", resize);

  /* pre-rendered puff sprites — layered soft blobs, irregular like real smoke */
  function makeSprite(r, g, b) {
    const s = document.createElement("canvas");
    s.width = s.height = 160;
    const c = s.getContext("2d");
    for (let i = 0; i < 8; i++) {
      const x = 80 + (Math.random() - .5) * 52;
      const y = 80 + (Math.random() - .5) * 52;
      const rad = 26 + Math.random() * 36;
      const grad = c.createRadialGradient(x, y, 0, x, y, rad);
      grad.addColorStop(0, `rgba(${r},${g},${b},${0.09 + Math.random() * 0.07})`);
      grad.addColorStop(0.6, `rgba(${r},${g},${b},${0.03})`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
      c.fillStyle = grad;
      c.beginPath(); c.arc(x, y, rad, 0, 7); c.fill();
    }
    return s;
  }
  const graySprites = [], warmSprites = [];
  for (let i = 0; i < 3; i++) {
    graySprites.push(makeSprite(178, 186, 196));   // cold ash-gray smoke
    warmSprites.push(makeSprite(255, 150, 70));    // ember-lit smoke
  }

  const COUNT = 60;
  const parts = [];

  function spawn(p, anywhere) {
    p.x = Math.random() * (W + 200) - 100;
    p.y = anywhere ? Math.random() * H : H + 60 + Math.random() * 80;
    p.vx = (Math.random() - .5) * 0.2;
    p.vy = -(0.15 + Math.random() * 0.3);          // initial rise
    p.life = 0;
    p.maxLife = 700 + Math.random() * 500;          // frames (~12-20s)
    p.size = 55 + Math.random() * 85;
    p.grow = 0.05 + Math.random() * 0.06;           // smoke expands as it rises
    p.rot = Math.random() * Math.PI * 2;
    p.vr = (Math.random() - .5) * 0.004;            // slow tumble
    p.seed = Math.random() * 1000;
    p.alpha = 0.10 + Math.random() * 0.14;
    const warm = Math.random() < 0.15;
    p.sprite = (warm ? warmSprites : graySprites)[(Math.random() * 3) | 0];
  }
  for (let i = 0; i < COUNT; i++) { const p = {}; spawn(p, true); parts.push(p); }

  let t = 0, last = performance.now();
  function frame(now) {
    requestAnimationFrame(frame);
    const dt = Math.min((now - last) / 16.7, 3);    // frame-rate independent
    last = now;
    if (document.hidden) return;
    t += dt * 0.008;
    ctx.clearRect(0, 0, W, H);

    const wind = Math.sin(t * 0.9) * 0.010 + 0.004; // slow shifting breeze

    for (const p of parts) {
      p.life += dt;
      if (p.life > p.maxLife || p.y < -p.size * 2.2) spawn(p, false);

      /* turbulence — cheap curl-style field sampled per particle */
      const swirl1 = Math.sin(p.seed + p.y * 0.006 + t * 1.4);
      const swirl2 = Math.cos(p.seed * 1.7 + p.x * 0.005 + t);
      p.vx += (swirl1 * 0.011 + wind) * dt;         // lateral eddies + wind
      p.vy += (-0.0026 + swirl2 * 0.0035) * dt;     // buoyancy + vertical churn
      p.vx *= 0.985; p.vy *= 0.996;                 // air drag
      p.x += p.vx * dt * 2.0;
      p.y += p.vy * dt * 2.0;
      p.rot += p.vr * dt;
      p.size += p.grow * dt;                        // dissipating expansion

      const lf = p.life / p.maxLife;
      const fade = lf < 0.18 ? lf / 0.18 : 1 - (lf - 0.18) / 0.82;
      ctx.globalAlpha = p.alpha * fade;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.drawImage(p.sprite, -p.size, -p.size, p.size * 2, p.size * 2);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }
  requestAnimationFrame(frame);
})();

/* ============================================================
   LIVE TELEMETRY
============================================================ */
const HISTORY = 90;
const cardsEl = document.getElementById("cards");
const emptyEl = document.getElementById("empty");
const cardRegistry = new Map();

const fmt = (n, d = 0) => Number(n).toLocaleString("en", { maximumFractionDigits: d, minimumFractionDigits: d });
const tempClass = t => t >= 80 ? "t-hot" : t >= 65 ? "t-warm" : "";

function gpuRow() {
  const row = document.createElement("div");
  row.className = "gpu-row";
  row.innerHTML = `
    <div class="gpu-top">
      <span class="gpu-idx"></span>
      <span class="gpu-name"></span>
      <span class="gpu-chips">
        <span class="clk">CLK <b></b></span>
        <span class="fan">FAN <b></b></span>
        <span class="temp">TEMP <b></b></span>
        <span class="pwr">PWR <b></b></span>
      </span>
    </div>
    <div class="gpu-mid">
      <div class="util-num"><span class="u">0</span><small>%</small><span class="cap">GPU LOAD</span></div>
      <div class="bars">
        <div class="seg-wrap"><div class="seg-fill"></div><div class="seg-mask"></div></div>
        <div class="vram-line">
          <span class="k">VRAM</span>
          <div class="vbar"><i></i></div>
          <span class="v"></span>
        </div>
      </div>
      <canvas class="spark" width="140" height="52"></canvas>
    </div>`;
  return {
    el: row,
    idx: row.querySelector(".gpu-idx"),
    name: row.querySelector(".gpu-name"),
    tempWrap: row.querySelector(".temp"),
    temp: row.querySelector(".temp b"),
    pwr: row.querySelector(".pwr b"),
    clkWrap: row.querySelector(".clk"),
    clk: row.querySelector(".clk b"),
    fanWrap: row.querySelector(".fan"),
    fan: row.querySelector(".fan b"),
    utilNum: row.querySelector(".u"),
    segFill: row.querySelector(".seg-fill"),
    vramBar: row.querySelector(".vbar > i"),
    vramText: row.querySelector(".vram-line .v"),
    spark: row.querySelector("canvas.spark"),
  };
}

function drawSpark(canvas, series) {
  const ctx = canvas.getContext("2d");
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.strokeStyle = "rgba(85, 215, 255, .12)";
  ctx.lineWidth = 1;
  for (let gy = 1; gy <= 3; gy++) {
    ctx.beginPath(); ctx.moveTo(0, (h / 4) * gy); ctx.lineTo(w, (h / 4) * gy); ctx.stroke();
  }
  if (series.length < 2) return;
  const step = w / (HISTORY - 1);
  const y = v => h - 2 - (v / 100) * (h - 4);
  const x0 = w - (series.length - 1) * step;

  ctx.beginPath();
  series.forEach((v, i) => { const x = x0 + i * step; i ? ctx.lineTo(x, y(v)) : ctx.moveTo(x, y(v)); });
  ctx.save();
  ctx.lineTo(x0 + (series.length - 1) * step, h); ctx.lineTo(x0, h); ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, "rgba(255, 158, 44, .30)");
  grad.addColorStop(1, "rgba(255, 158, 44, .02)");
  ctx.fillStyle = grad; ctx.fill();
  ctx.restore();

  ctx.beginPath();
  series.forEach((v, i) => { const x = x0 + i * step; i ? ctx.lineTo(x, y(v)) : ctx.moveTo(x, y(v)); });
  ctx.strokeStyle = "#ff9e2c"; ctx.lineWidth = 1.6; ctx.lineJoin = "round"; ctx.stroke();
}

function makeCard(host) {
  const el = document.createElement("div");
  el.className = "card brk";
  el.innerHTML = `
    <span class="brk-b"></span>
    <div class="card-head">
      <span class="sq"></span>
      <span class="host"></span>
      <span class="spacer"></span>
      <span class="status"></span>
    </div>
    <div class="card-body">
      <div class="gpus"></div>
      <div class="ram-row">
        <span class="k">SYSTEM RAM</span>
        <div class="vbar"><i></i></div>
        <span class="v"></span>
      </div>
    </div>`;
  el.querySelector(".host").textContent = host;
  cardsEl.appendChild(el);
  return {
    el,
    status: el.querySelector(".status"),
    gpusEl: el.querySelector(".gpus"),
    ramBar: el.querySelector(".ram-row .vbar > i"),
    ramText: el.querySelector(".ram-row .v"),
    gpuRows: new Map(),
    history: new Map(),
  };
}

function render(snapshot) {
  const seen = new Set();
  let gpuCount = 0, utilSum = 0, utilN = 0, vramUsed = 0, online = 0;

  for (const s of snapshot.servers) {
    seen.add(s.host);
    let card = cardRegistry.get(s.host);
    if (!card) { card = makeCard(s.host); cardRegistry.set(s.host, card); }

    card.el.classList.toggle("offline", !s.online);
    card.status.className = "status " + (s.online ? "on" : "off");
    card.status.textContent = s.online ? "◉ OPERATIONAL" : "◌ SIGNAL LOST";
    if (s.online) online++;

    const m = s.metrics || {};
    const gpus = m.gpus || [];

    if (m.gpu_error && !gpus.length) {
      if (!card.gpusEl.querySelector(".gpu-error")) {
        card.gpusEl.innerHTML = '<div class="gpu-error"></div>';
      }
      card.gpusEl.querySelector(".gpu-error").textContent = "[!] NVIDIA-SMI FAULT: " + m.gpu_error;
    } else {
      const err = card.gpusEl.querySelector(".gpu-error");
      if (err) err.remove();
    }

    for (const g of gpus) {
      gpuCount++; vramUsed += (g.mem_used || 0) / 1024;
      if (s.online) { utilSum += g.util; utilN++; }

      let row = card.gpuRows.get(g.index);
      if (!row) { row = gpuRow(); card.gpuRows.set(g.index, row); card.gpusEl.appendChild(row.el); }

      row.idx.textContent = "[GPU-" + g.index + "]";
      row.name.textContent = g.name.toUpperCase();
      row.utilNum.textContent = fmt(g.util);
      row.segFill.style.width = Math.min(100, g.util) + "%";
      row.segFill.classList.toggle("hot", g.util >= 90);
      row.temp.textContent = fmt(g.temp) + "°C";
      row.tempWrap.className = "temp " + tempClass(g.temp);
      row.clkWrap.style.display = g.clock > 0 ? "" : "none";
      row.clk.textContent = fmt(g.clock) + "MHz";
      row.fanWrap.style.display = g.fan > 0 ? "" : "none";
      row.fan.textContent = fmt(g.fan) + "%";
      row.pwr.textContent = g.power_limit > 0
        ? `${fmt(g.power)}W/${fmt(g.power_limit)}W`
        : `${fmt(g.power)}W`;
      const memPct = g.mem_total ? (g.mem_used / g.mem_total) * 100 : 0;
      row.vramBar.style.width = memPct + "%";
      row.vramText.textContent = `${fmt(g.mem_used / 1024, 1)}/${fmt(g.mem_total / 1024, 1)} GB`;

      if (!card.history.has(g.index)) card.history.set(g.index, []);
      const h = card.history.get(g.index);
      if (s.online) { h.push(g.util); if (h.length > HISTORY) h.shift(); }
      drawSpark(row.spark, h);
    }

    const ram = m.ram || {};
    card.ramBar.style.width = (ram.percent || 0) + "%";
    card.ramText.textContent = `${fmt(ram.used_gb, 1)}/${fmt(ram.total_gb, 1)} GB · ${fmt(ram.percent, 1)}%`;
  }

  for (const [host, card] of cardRegistry) {
    if (!seen.has(host)) { card.el.remove(); cardRegistry.delete(host); }
  }

  emptyEl.style.display = snapshot.servers.length ? "none" : "";
  document.getElementById("unitCount").textContent = snapshot.servers.length + " UNITS TRACKED";
  document.getElementById("tServers").textContent = `${online}/${snapshot.servers.length}`;
  document.getElementById("tGpus").textContent = gpuCount;
  document.getElementById("tUtil").innerHTML = (utilN ? fmt(utilSum / utilN) : "–") + "<small>%</small>";
  document.getElementById("tVram").innerHTML = fmt(vramUsed, 1) + "<small>GB</small>";
}

/* websocket — connects to whichever host serves this page, auto-reconnect */
const hubLed = document.getElementById("hubLed");
const hubText = document.getElementById("hubText");
let retry = 1000;

function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${proto}://${location.host}/ws/dashboard${location.search}`);
  ws.onopen = () => {
    retry = 1000;
    hubLed.className = "led live";
    hubText.textContent = "UPLINK ACTIVE";
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === "snapshot") render(msg);
  };
  ws.onclose = () => {
    hubLed.className = "led dead";
    hubText.textContent = "UPLINK LOST — RETRYING";
    setTimeout(connect, retry);
    retry = Math.min(retry * 1.6, 10000);
  };
}
connect();
